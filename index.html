<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>English Flashcards</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loginPage">
<div class="loginCard">

    <h1>

        📘 Flashcards

    </h1>

    <p>

        Welcome Back

    </p>


    <input
        id="txtUsername"
        type="text"
        placeholder="Username">


    <input
        id="txtPassword"
        type="password"
        placeholder="Password">


    <button id="btnLogin">

        Login

    </button>


    <div id="loginMessage">

    </div>

</div>
</div>

<div id="appContainer"  style="display:none;" >

    <!-- کل سایت فعلی اینجا قرار می‌گیرد -->
<div class="layout"></div>



</div>








    <!-- ========================= -->
    <!-- Sidebar -->
    <!-- ========================= -->

    <aside class="sidebar" id="sidebar">

<div class="logo" id="btnCollapse">

    📘 Flashcards

</div>

        <button
            class="menuItem active"
            id="menuPractice">

            Practice

        </button>

        <button
            class="menuItem"
            id="menuAddWord">

            Add Word

        </button>

        <button
            class="menuItem"
            id="menuStatistics">

            Statistics

        </button>

        <button
        class="menuItem"
        id="menuHeatmap">

            Heatmap

        </button>


    </aside>


    <!-- ========================= -->
    <!-- Main -->
    <!-- ========================= -->

    <main class="mainContent">

        <!-- Mobile Header -->

        <header class="mobileHeader">

            <button
                id="btnMenu"
                class="menuButton">

                ☰

            </button>

            <span>

                English Flashcards

            </span>

        </header>


        <!-- ========================= -->
        <!-- Categories -->
        <!-- ========================= -->

        <section id="pageCategories">

            <h1>

                English Flashcards

            </h1>

            <div class="streakCard">

    <div class="streakIcon">
        🔥
    </div>

    <div>

        <div class="streakTitle">
            Current Streak
        </div>

        <div
            id="streakValue"
            class="streakValue">

            0 Days

        </div>

    </div>

</div>

            <div
                id="categories"
                class="grid">

            </div>

        </section>


        <!-- ========================= -->
        <!-- Stages -->
        <!-- ========================= -->

        <section
            id="pageStages"
            style="display:none;">

            <div class="topbar">

                <button
                    id="btnBackCategories">

                    ← Categories

                </button>

                <h2 id="categoryName">

                </h2>

            </div>


            <div class="summaryCard">

                <div class="summaryItem">

                    <div class="summaryTitle">

                        Total Words

                    </div>

                    <div
                        id="totalWords"
                        class="summaryValue">

                        0

                    </div>

                </div>

                <div class="summaryItem">

                    <div class="summaryTitle">

                        Ready Today

                    </div>

                    <div
                        id="readyWords"
                        class="summaryValue">

                        0

                    </div>

                </div>

                <div class="summaryItem">

                    <div class="summaryTitle">

                        Progress

                    </div>

                    <div
                        id="progressPercent"
                        class="summaryValue">

                        0%

                    </div>

                </div>

            </div>

            <div
                id="stages"
                class="grid">

            </div>

        </section>



        <!-- ========================= -->
        <!-- Study Page -->
        <!-- ========================= -->

        <section
            id="pageStudy"
            style="display:none;">

            <div class="topbar">

                <button
                    id="btnBackStages">

                    ← Stages

                </button>

                <span id="progress">

                </span>



            </div>

            <div class="studyHeader">

    			<div id="studyPath"></div>

   		 	<h2 id="studyTitle"></h2>

		</div>



            </h2>

            <div class="card">

                <div id="word">

                </div>

            </div>

            <div class="dictation">

                <input

                    id="txtAnswer"

                    type="text"

                    autocomplete="off"

                    spellcheck="false"

                    placeholder="Type the word..."

                >

                <button
                    id="btnCheck">

                    Check

                </button>

            </div>

            <div
                id="result"
                class="result">

            </div>

            <div
                id="correctWord"
                class="correctWord">

            </div>

            <div
                id="reviewButtons"
                class="reviewButtons"
                style="display:none;">

                <button id="btnKnow">

                    ✅ Know

                </button>

                <button id="btnDontKnow">

                    ❌ Don't Know

                </button>

                <button id="btnMaster">

                    ⭐ Master

                </button>

            </div>

        </section>



        <!-- ========================= -->
        <!-- Finish -->
        <!-- ========================= -->

        <section

            id="pageFinish"

            style="display:none;">

            <div class="finish">

                <h1>

                    🎉

                </h1>

                <h2>

                    Congratulations!

                </h2>

                <p>

                    You have finished this stage.

                </p>

                <button
                    id="btnFinishBack">

                    Back

                </button>

            </div>

        </section>



        <!-- ========================= -->
        <!-- Add Word -->
        <!-- ========================= -->

        <section

            id="pageAddWord"

            style="display:none;">

            <h2>

                Add New Word

            </h2>

            <div class="addWordCard">

                <label>

                    Category

                </label>

                <select id="cmbCategory">

                </select>


                <label>

                    Word

                </label>

                <input

                    id="txtNewWord"

                    type="text"

                    autocomplete="off"

                    placeholder="Enter a new word"

                >


                <button
                    id="btnSaveWord">

                    Save

                </button>


                <div
                    id="saveMessage">

                </div>

            </div>

        </section>


<!-- ========================= -->
<!-- Statistics -->
<!-- ========================= -->

<section
    id="pageStatistics"
    style="display:none;">

    <h2>

        Statistics

    </h2>

    <div class="statisticsToolbar">

    <label>

        Month

    </label>

    <select id="cmbStatisticsMonth">

    </select>

</div>

    <div class="statisticsCard chartContainer">

        <canvas
            id="statisticsChart">

        </canvas>

    </div>

</section>





<!-- ========================= -->
<!-- Heatmap -->
<!-- ========================= -->

<section

    id="pageHeatmap"

    style="display:none;">

    <h2>

        Study Heatmap

    </h2>


    <div class="heatmapCard">

        <div id="heatmapContainer">

        </div>

    </div>


</section>





    </main>

</div>


<!-- ========================= -->
<!-- Mobile Overlay -->
<!-- ========================= -->

<div
    id="overlay"
    class="overlay">

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>


<!-- Loading -->

<div id="loading">

    <div class="loader"></div>

</div>



</body>

</html>
